
<div id="authSection">
    <!-- login + signup here -->

<h2>Signup</h2>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="email" id="signup_email" placeholder="Email"><br><br>
<input type="password" id="signup_password" placeholder="Password"><br><br>

<button onclick="signup()">Signup</button>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
</div>

<h2>Submit Complaint</h2>

<input type="text" id="title" placeholder="Title"><br><br>

<textarea id="description" placeholder="Enter complaint"></textarea><br><br>
<select id="priority">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
</select>
<select id="category"></select>
<input oninput="searchComplaints(this.value)" placeholder="Search">

<button onclick="submitComplaint()">Submit</button>
<h2>All Complaints</h2>
<button onclick="loadComplaints()">Load Complaints</button>
<input id="trackId" placeholder="Enter Complaint ID">
<button onclick="trackComplaint()">Track</button>

<p id="trackResult"></p>

<ul id="list"></ul>


<p id="userInfo"></p>
<button onclick="logout()">Logout</button>

<script src="script.js"></script>
